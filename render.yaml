services:
  - type: web
    name: fleet-pulse-server
    env: node
    buildCommand: npm install --include=dev
    startCommand: npm run server
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TCP_PORT
        value: 5000
      - key: WS_PORT
        value: 8080
      - key: NODE_ENV
        value: production
